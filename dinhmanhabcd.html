<!DOCTYPE html>
<html>
<head>
  <title>Admin tạo link</title>
</head>
<body>

<h2>Tạo link mobileconfig</h2>

<input id="name" placeholder="Nhập tên user" />
<button onclick="createLink()">Tạo link</button>

<div id="result" style="margin-top:20px;"></div>

<script>
async function createLink() {
  const name = document.getElementById("name").value;

  const res = await fetch("/api/create", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });

  const data = await res.json();

  const fullLink = location.origin + "/download.html?data=" + data.data;

  document.getElementById("result").innerHTML = `
    <p>Link:</p>
    <input value="${fullLink}" id="linkInput" style="width:300px" readonly />
    <button onclick="copyLink()">Copy</button>
  `;
}

function copyLink() {
  const input = document.getElementById("linkInput");
  input.select();
  document.execCommand("copy");
  alert("Đã copy link!");
}
</script>

</body>
</html>
