<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin tạo link</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f2f5;
      padding: 15px; /* Thêm padding để không bị sát mép điện thoại */
      box-sizing: border-box;
    }
    .container {
      background-color: #fff;
      padding: 25px 20px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }
    h2 {
      margin-top: 0;
      font-size: 22px;
      color: #333;
    }
    input {
      width: 100%;
      padding: 12px; /* Tăng padding để dễ bấm trên cảm ứng */
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      margin-bottom: 15px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background-color: #007bff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%; /* Kéo dài nút ra cho dễ bấm */
    }
    button:hover {
      background-color: #0056b3;
    }
    #result {
      margin-top: 20px;
      border-top: 1px solid #eee;
      padding-top: 20px;
      word-break: break-all; /* Tránh link dài làm vỡ layout */
    }
    .countdown {
      color: #dc3545;
      font-weight: bold;
      font-size: 16px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Tạo link mobileconfig</h2>

  <input id="name" placeholder="Nhập tên user (VD: 0936080757)" />
  <button onclick="createLink()">Tạo link</button>

  <div id="result" style="display: none;"></div>
</div>

<script>
let countdownTimer;

async function createLink() {
  const name = document.getElementById("name").value;
  if (!name) {
    alert("Vui lòng nhập tên user!");
    return;
  }

  const res = await fetch("/api/create", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });

  const data = await res.json();
  const fullLink = location.origin + "/download.html?data=" + data.data;

  const decodedData = JSON.parse(atob(data.data));
  const expTime = decodedData.exp;

  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "block";
  resultDiv.innerHTML = `
    <p style="margin: 0 0 10px 0; font-size: 14px; color: #555;">Link tải cho <b>${name}</b>:</p>
    <input value="${fullLink}" id="linkInput" readonly />
    <button onclick="copyLink()" style="background-color: #28a745; margin-bottom: 10px;">Copy Link</button>
    <div id="timeRemaining" class="countdown">Đang tính thời gian...</div>
  `;

  startCountdown(expTime);
}

function startCountdown(expTime) {
  if (countdownTimer) clearInterval(countdownTimer);
  const display = document.getElementById("timeRemaining");

  countdownTimer = setInterval(() => {
    const now = Date.now();
    const distance = expTime - now;

    if (distance <= 0) {
      clearInterval(countdownTimer);
      display.innerHTML = "Link đã hết hạn!";
      display.style.color = "gray";
      return;
    }

    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
    const formatSeconds = seconds < 10 ? "0" + seconds : seconds;

    display.innerHTML = `Link tự huỷ sau: ${minutes}:${formatSeconds}`;
  }, 1000);
}

function copyLink() {
  const input = document.getElementById("linkInput");
  input.select();
  document.execCommand("copy");
  alert("Đã copy link thành công!");
}
</script>

</body>
</html>
